name: Conda Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Cargo.toml
      - Cargo.lock
      - pyproject.toml
      - README.md
      - python/**
      - src/**
      - THIRDPARTY.yml
      - .github/workflows/conda-smoke.yml
      - .github/conda-smoke/**
  pull_request:
    branches:
      - main
    paths:
      - Cargo.toml
      - Cargo.lock
      - pyproject.toml
      - README.md
      - python/**
      - src/**
      - THIRDPARTY.yml
      - .github/workflows/conda-smoke.yml
      - .github/conda-smoke/**

permissions:
  contents: read

jobs:
  windows-conda-nonvendored:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: .github/conda-smoke/environment-win.yml
          environment-name: conda-smoke
          cache-environment: false
          cache-downloads: true
          init-shell: >-
            bash

      - name: Install handle.exe
        shell: pwsh
        run: |
          $toolDir = ".github/conda-smoke/tools"
          New-Item -ItemType Directory -Force -Path $toolDir | Out-Null
          $zipPath = Join-Path $toolDir "Handle.zip"
          Invoke-WebRequest "https://download.sysinternals.com/files/Handle.zip" -OutFile $zipPath
          Expand-Archive $zipPath -DestinationPath $toolDir -Force

      - name: Build local conda smoke recipe
        shell: bash -el {0}
        env:
          HANDLE_EXE: ${{ github.workspace }}\.github\conda-smoke\tools\handle64.exe
        run: |
          set -euo pipefail
          rattler-build build \
            -r .github/conda-smoke \
            --target-platform win-64 \
            --variant-config .github/conda-smoke/win64.yaml \
            --output-dir .github/conda-smoke/output \
            --keep-build \
            --log-style plain 2>&1 | tee .github/conda-smoke/build.log

      - name: Assert non-vendored Lua path
        shell: bash -el {0}
        run: |
          set -euo pipefail
          if grep -n "Downloaded lua-src" .github/conda-smoke/build.log; then
            echo "::error::Vendored lua-src was still pulled into the build."
            exit 1
          fi
          grep -n -- "--no-default-features" .github/conda-smoke/build.log
          grep -n "Archive written to" .github/conda-smoke/build.log
          grep -n "pip check" .github/conda-smoke/build.log
          grep -n 'python -c "import burner_redis; burner_redis.BurnerRedis()"' .github/conda-smoke/build.log

      - name: Collect Windows smoke diagnostics
        if: always()
        shell: pwsh
        run: |
          $diagDir = ".github/conda-smoke/diagnostics"
          New-Item -ItemType Directory -Force -Path $diagDir | Out-Null

          $buildRoot = Get-ChildItem ".github/conda-smoke/output/bld" -Directory |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object -First 1

          if (-not $buildRoot) {
            Write-Host "No build root found under .github/conda-smoke/output/bld"
            exit 0
          }

          $filesToCopy = @(
            (Join-Path $buildRoot.FullName "conda_build.bat"),
            (Join-Path $buildRoot.FullName "build_env.bat"),
            (Join-Path $buildRoot.FullName "work/smoke-pip.stdout.log"),
            (Join-Path $buildRoot.FullName "work/smoke-pip.stderr.log"),
            (Join-Path $buildRoot.FullName "work/process-snapshot.txt"),
            (Join-Path $buildRoot.FullName "work/handle-src.txt"),
            (Join-Path $buildRoot.FullName "work/handle-root.txt")
          )

          foreach ($path in $filesToCopy) {
            if (Test-Path $path) {
              Copy-Item $path -Destination (Join-Path $diagDir ([IO.Path]::GetFileName($path))) -Force
            }
          }

          Get-ChildItem $buildRoot.FullName -Force -Recurse |
            Select-Object FullName, Attributes, Length |
            Format-Table -AutoSize |
            Out-File (Join-Path $diagDir "build-root-tree.txt") -Width 4096

          Get-ChildItem $buildRoot.FullName -Force -Recurse |
            Where-Object { $_.Name -like "*pending-rm*" } |
            Select-Object FullName, Attributes, Length |
            Format-Table -AutoSize |
            Out-File (Join-Path $diagDir "pending-rm.txt") -Width 4096

          Get-CimInstance Win32_Process |
            Where-Object {
              $_.Name -in @("cargo.exe", "rustc.exe", "python.exe", "cmd.exe", "powershell.exe", "link.exe", "cl.exe") -or
              ($_.CommandLine -match "burner-redis|maturin|rattler-build")
            } |
            Select-Object Name, ProcessId, ParentProcessId, ExecutablePath, CommandLine |
            Sort-Object Name, ProcessId |
            Format-List |
            Out-File (Join-Path $diagDir "processes.txt") -Width 4096

          Get-ChildItem $diagDir | Select-Object Name,Length | Format-Table -AutoSize

      - name: Upload conda smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conda-smoke-win-build
          path: |
            .github/conda-smoke/build.log
            .github/conda-smoke/diagnostics/
            .github/conda-smoke/output/win-64/
