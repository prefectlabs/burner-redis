name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches Cargo.toml version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match Cargo.toml [package].version = $CARGO_VERSION"
            exit 1
          fi
          echo "Cargo.toml OK: $CARGO_VERSION"

      - name: Verify tag matches Cargo.lock version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          LOCK_VERSION=$(grep -A1 '^name = "burner-redis"$' Cargo.lock | grep -m1 '^version = ' | sed -E 's/version = "(.*)"/\1/')
          if [ -z "$LOCK_VERSION" ]; then
            echo "::error::Could not locate burner-redis version block in Cargo.lock"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$LOCK_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match Cargo.lock [[package]] name=\"burner-redis\" version = $LOCK_VERSION (partial bump — did you forget to run cargo update -p burner-redis or cargo build after editing Cargo.toml?)"
            exit 1
          fi
          echo "Cargo.lock OK: $LOCK_VERSION"

  gate:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Wait for required workflows to succeed on ${{ github.sha }}
        run: |
          set -u
          required_workflows=(ci.yml pydocket-compat.yml)
          for wf in "${required_workflows[@]}"; do
            echo "::group::Checking $wf on $GITHUB_SHA"
            status=""
            conclusion=""
            url=""
            run_found=false
            for i in $(seq 1 40); do
              # Fallback: GitHub's `?head_sha=` filter on /actions/runs is unreliable
              # (sometimes returns total_count=0 even for runs that exist). Use the
              # gh CLI shorthand first, then fall back to a per_page=20 + jq filter
              # against the last 20 runs to recover from indexing hiccups.
              run=$(gh run list \
                -R "$GITHUB_REPOSITORY" \
                --workflow="$wf" \
                --commit="$GITHUB_SHA" \
                --limit=1 \
                --json status,conclusion,url \
                -q '.[0]' 2>/dev/null || echo "")
              if [ -z "$run" ] || [ "$run" = "null" ]; then
                # Workflow file path lookup (per_page=20 covers our typical traffic)
                wf_path=".github/workflows/${wf}"
                run=$(gh api \
                  "repos/${GITHUB_REPOSITORY}/actions/runs?per_page=20" \
                  --jq ".workflow_runs[] | select(.head_sha == \"${GITHUB_SHA}\" and .path == \"${wf_path}\") | {status, conclusion, url: .html_url}" \
                  2>/dev/null | head -1)
              fi
              if [ -z "$run" ] || [ "$run" = "null" ]; then
                # Still not indexed — keep polling instead of failing immediately.
                # This handles GitHub's head_sha filter latency without dropping the
                # safety check (the loop has a 10-minute ceiling via the i<=40 bound).
                echo "  $wf: no run indexed yet for $GITHUB_SHA — waiting 15s... ($i/40)"
                sleep 15
                continue
              fi
              run_found=true
              status=$(echo "$run" | jq -r .status)
              conclusion=$(echo "$run" | jq -r .conclusion)
              url=$(echo "$run" | jq -r .url)
              if [ "$status" = "completed" ]; then
                if [ "$conclusion" = "success" ]; then
                  echo "OK: $wf succeeded on $GITHUB_SHA ($url)"
                  break
                fi
                echo "ERROR: $wf did not succeed on $GITHUB_SHA: conclusion=$conclusion (see $url)"
                exit 1
              fi
              echo "  $wf status=$status — waiting 15s... ($i/40)"
              sleep 15
            done
            if [ "$run_found" = "false" ]; then
              echo "ERROR: no $wf run found for $GITHUB_SHA after 10 minutes of polling"
              echo "       was this commit pushed to main before tagging?"
              exit 1
            fi
            if [ "$status" != "completed" ]; then
              echo "ERROR: $wf did not complete within 10 minutes on $GITHUB_SHA (last status=$status, see $url)"
              exit 1
            fi
            echo "::endgroup::"
          done
          echo "All required workflows green on $GITHUB_SHA."

  build:
    needs: [verify-version]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            manylinux: auto
          - os: ubuntu-latest
            target: aarch64
            manylinux: auto
          - os: ubuntu-latest
            target: x86_64
            manylinux: musllinux_1_2
          - os: ubuntu-latest
            target: aarch64
            manylinux: musllinux_1_2
          - os: macos-15-intel
            target: x86_64
            manylinux: auto
          - os: macos-14
            target: aarch64
            manylinux: auto
          - os: windows-latest
            target: x86_64
            manylinux: auto
          - os: windows-11-arm
            target: aarch64
            manylinux: auto
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.target == 'aarch64' && runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}-${{ matrix.manylinux }}
          path: dist/

  sdist:
    needs: [verify-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Verify sdist contains THIRDPARTY.yml
        run: |
          VERSION=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          tar -tzf "dist/burner_redis-${VERSION}.tar.gz" | grep -Fx "burner_redis-${VERSION}/THIRDPARTY.yml"

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/

  release:
    needs: [verify-version, gate, build, sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/burner-redis
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
