schema_version: 1

context:
  name: burner-redis
  # Keep this in sync with Cargo.toml when the package version changes.
  version: "0.1.5"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  path: ../..

build:
  number: 0
  script:
    - set BUILD_SRC=%TEMP%\burner-redis-src-%RANDOM%%RANDOM%
    - powershell -NoProfile -Command "Copy-Item -LiteralPath $env:SRC_DIR -Destination $env:BUILD_SRC -Recurse -Force"
    - set CARGO_TARGET_DIR=%TEMP%\burner-redis-cargo-target-%RANDOM%%RANDOM%
    - set LUA_LIB_NAME=lua
    - set LUA_LIB=%LIBRARY_LIB%
    - cd /D "%BUILD_SRC%"
    - python -m pip install "%BUILD_SRC%" -vv --no-build-isolation --config-settings=build-args=--no-default-features 1> "%SRC_DIR%\\smoke-pip.stdout.log" 2> "%SRC_DIR%\\smoke-pip.stderr.log"
    - powershell -NoProfile -Command "Get-CimInstance Win32_Process | Where-Object { $_.Name -in @('cargo.exe','rustc.exe','python.exe','cmd.exe','powershell.exe','link.exe','cl.exe') -or ($_.CommandLine -match 'burner-redis|maturin|rattler-build') } | Select-Object Name,ProcessId,ParentProcessId,ExecutablePath,CommandLine | Sort-Object Name,ProcessId | Format-List | Out-File (Join-Path $env:SRC_DIR 'process-snapshot.txt') -Width 4096"
    - powershell -NoProfile -Command "$tool = Join-Path $env:GITHUB_WORKSPACE '.github\\conda-smoke\\tools\\handle64.exe'; if (Test-Path $tool) { & $tool -accepteula $env:SRC_DIR *>&1 | Out-File (Join-Path $env:SRC_DIR 'handle-src.txt') -Width 4096; & $tool -accepteula (Split-Path -Parent $env:SRC_DIR) *>&1 | Out-File (Join-Path $env:SRC_DIR 'handle-root.txt') -Width 4096 }"

requirements:
  build:
    - vs2022_win-64
    - vs_win-64
    - rust_win-64 >=1.94
  host:
    - pip
    - python
    - maturin >=1,<2
    - lua >=5.4,<5.5
  run:
    - python

tests:
  - requirements:
      run:
        - pip
    script:
      - pip check
      - python -c "import burner_redis; burner_redis.BurnerRedis()"

about:
  summary: Windows conda smoke test for the non-vendored Lua build path
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
